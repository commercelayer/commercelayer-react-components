packages:
  - packages/*

allowBuilds:
  esbuild: true
  iframe-resizer: true
  msgpackr-extract: true
  msw: true
  nx: true

minimumReleaseAgeExclude:
  - rapid-form@4.0.3
  - '@storybook/addon-docs@10.5.3'
  - '@storybook/addon-links@10.5.3'
  - '@storybook/addon-onboarding@10.5.3'
  - '@storybook/csf-plugin@10.5.3'
  - '@storybook/react-dom-shim@10.5.3'
  - '@storybook/react-vite@10.5.3'
  - '@storybook/react@10.5.3'
  - storybook@10.5.3
  - tsdown@0.22.12
  - verkit@0.1.0

onlyBuiltDependencies:
  - esbuild
  - iframe-resizer
  - msw
  - nx

overrides:
  tar: '>=7.5.11'
  rollup: '>=4.59.0'
  '@isaacs/brace-expansion@<=5.0.0': '>=5.0.1'
  'axios@>=1.0.0 <=1.7.7': '>=1.13.5'
  'minimatch@<3.1.4': '>=3.1.4'
  'minimatch@>=5.0.0 <5.1.8': '>=5.1.8'
  'minimatch@>=9.0.0 <9.0.7': '>=9.0.7'
  'minimatch@>=10.0.0 <10.2.3': '>=10.2.3'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '>=8.18.0'
  'esbuild@<=0.24.2': '>=0.25.0'
  'picomatch@<2.3.2': '>=2.3.2'
  'picomatch@>=4.0.0 <4.0.4': '>=4.0.4'
  'storybook@>=10.0.0-beta.0 <10.3.6': '>=10.3.6'
  '@storybook/builder-vite': '>=10.3.6'
  'valibot@>=1.0.0 <1.3.0': '>=1.3.0'
  # security fixes — issue #775
  'fast-uri': '>=3.1.2'
  '@babel/plugin-transform-modules-systemjs': '>=7.29.4'
  'js-cookie': '>=3.0.6'
  'postcss': '>=8.5.10'
  'qs@>=6.11.1': '>=6.15.2'
  'uuid': '>=11.1.1'
  'axios@>=1.0.0': '>=1.15.1'
  'vitest': '>=4.1.0'
  'handlebars': '>=4.7.9'
  'lodash': '>=4.17.24'
